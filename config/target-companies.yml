# Target companies for the crawler. User-editable: add or remove rows as your
# target list evolves. Each row upserts into public.companies via
# `pnpm tsx scripts/seed-companies.ts`.
#
# Fields:
#   name     — human-readable company name.
#   ats      — one of: greenhouse | lever | ashby | workable | smartrecruiters
#   slug     — vendor-specific identifier. Find it in the careers page URL:
#                greenhouse: boards.greenhouse.io/<slug>
#                lever:      jobs.lever.co/<slug>
#                ashby:      jobs.ashbyhq.com/<slug>
#                workable:   apply.workable.com/<slug>
#   priority — 0–10 (higher crawled first). Default 0.
#   careers_url — optional; the public careers page URL.
#
# The starter list below mixes documented example slugs (safe to crawl) with a
# handful of well-known companies. Confirm each slug against the live careers
# page before enabling in production; vendors do change these.

